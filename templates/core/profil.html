<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ESMT Collab Hub | Mon Profil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-3xl mx-auto">
        <div class="flex items-center gap-4 mb-8">
            <a href="{% url 'dashboard' %}" class="text-slate-400 hover:text-white transition"><i class="fas fa-arrow-left"></i> Retour</a>
            <h1 class="text-3xl font-bold">Modifier mon <span class="text-blue-400">Profil</span></h1>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="bg-green-500/20 border border-green-500 text-green-400 p-4 rounded-xl mb-6 text-sm">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <div class="glass p-8">
            <form method="POST" class="space-y-6">
                {% csrf_token %}

                <div class="flex items-center gap-6 mb-8 p-4 bg-white/5 rounded-2xl">
                    <div class="w-20 h-20 rounded-full bg-blue-600 flex items-center justify-center text-3xl font-bold">
                        {{ user.username|first|upper }}
                    </div>
                    <div>
                        <p class="text-slate-400 text-sm">Nom d'utilisateur</p>
                        <p class="text-xl font-bold">{{ user.username }}</p>
                        <span class="text-xs px-2 py-1 bg-blue-500/20 text-blue-400 rounded-lg">{{ user.get_role_display }}</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-slate-400 mb-2">Prénom</label>
                        <input type="text" name="first_name" value="{{ user.first_name }}" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 outline-none focus:border-blue-500 transition">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-2">Nom</label>
                        <input type="text" name="last_name" value="{{ user.last_name }}" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 outline-none focus:border-blue-500 transition">
                    </div>
                </div>

                <div>
                    <label class="block text-sm text-slate-400 mb-2">Adresse Email</label>
                    <input type="email" name="email" value="{{ user.email }}" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 outline-none focus:border-blue-500 transition">
                </div>

                <div class="pt-6 border-t border-white/10">
                    <label class="block text-sm text-slate-400 mb-2 font-semibold">Changer le mot de passe (Laisser vide pour ne pas modifier)</label>
                    <input type="password" name="new_password" placeholder="Nouveau mot de passe" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 outline-none focus:border-blue-500 transition">
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold transition shadow-lg shadow-blue-500/20">
                    Enregistrer les modifications
                </button>
            </form>
        </div>
    </div>
</body>
</html>
